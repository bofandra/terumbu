name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: terumbu-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${VPS_HOST}" || { echo "VPS_HOST secret is required"; exit 1; }
          test -n "${VPS_USER}" || { echo "VPS_USER secret is required"; exit 1; }
          test -n "${VPS_SSH_KEY}" || { echo "VPS_SSH_KEY secret is required"; exit 1; }

          install -m 700 -d ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/terumbu_deploy_key
          chmod 600 ~/.ssh/terumbu_deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Render production env
        env:
          TERUMBU_APP_PORT: ${{ vars.TERUMBU_APP_PORT }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          TERUMBU_POSTGRES_DB: ${{ vars.TERUMBU_POSTGRES_DB }}
          TERUMBU_POSTGRES_USER: ${{ vars.TERUMBU_POSTGRES_USER }}
          TERUMBU_POSTGRES_PASSWORD: ${{ secrets.TERUMBU_POSTGRES_PASSWORD }}
          TERUMBU_DATABASE_URL: ${{ secrets.TERUMBU_DATABASE_URL }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
          MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
          XENDIT_SECRET_KEY: ${{ secrets.XENDIT_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail

          clean_env_value() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          quote_env_value() {
            local value
            value="$(clean_env_value "$1")"
            printf "'%s'" "$(printf '%s' "${value}" | sed "s/'/'\\\\''/g")"
          }

          write_env_value() {
            printf '%s=' "$1" >> terumbu.production.env
            quote_env_value "$2" >> terumbu.production.env
            printf '\n' >> terumbu.production.env
          }

          APP_PORT="$(clean_env_value "${TERUMBU_APP_PORT:-3100}")"
          POSTGRES_DB="$(clean_env_value "${TERUMBU_POSTGRES_DB:-terumbu}")"
          POSTGRES_USER="$(clean_env_value "${TERUMBU_POSTGRES_USER:-terumbu}")"
          POSTGRES_PASSWORD="$(clean_env_value "${TERUMBU_POSTGRES_PASSWORD}")"
          PUBLIC_URL="$(clean_env_value "${NEXT_PUBLIC_APP_URL:-http://${VPS_HOST}:${APP_PORT}}")"
          POSTHOG_HOST_VALUE="$(clean_env_value "${POSTHOG_HOST:-https://app.posthog.com}")"

          test -n "${POSTGRES_PASSWORD}" || { echo "TERUMBU_POSTGRES_PASSWORD secret is required"; exit 1; }

          if [ -z "${TERUMBU_DATABASE_URL}" ]; then
            TERUMBU_DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
          else
            TERUMBU_DATABASE_URL="$(clean_env_value "${TERUMBU_DATABASE_URL}")"
          fi

          : > terumbu.production.env
          write_env_value TERUMBU_APP_PORT "${APP_PORT}"
          write_env_value TERUMBU_POSTGRES_DB "${POSTGRES_DB}"
          write_env_value TERUMBU_POSTGRES_USER "${POSTGRES_USER}"
          write_env_value TERUMBU_POSTGRES_PASSWORD "${POSTGRES_PASSWORD}"
          write_env_value TERUMBU_DATABASE_URL "${TERUMBU_DATABASE_URL}"
          write_env_value NEXT_PUBLIC_APP_URL "${PUBLIC_URL}"
          write_env_value NEXT_PUBLIC_MAPBOX_TOKEN "${NEXT_PUBLIC_MAPBOX_TOKEN}"
          write_env_value MIDTRANS_SERVER_KEY "${MIDTRANS_SERVER_KEY}"
          write_env_value MIDTRANS_CLIENT_KEY "${MIDTRANS_CLIENT_KEY}"
          write_env_value XENDIT_SECRET_KEY "${XENDIT_SECRET_KEY}"
          write_env_value RESEND_API_KEY "${RESEND_API_KEY}"
          write_env_value POSTHOG_KEY "${POSTHOG_KEY}"
          write_env_value POSTHOG_HOST "${POSTHOG_HOST_VALUE}"

      - name: Upload production env
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/terumbu_deploy_key "${VPS_USER}@${VPS_HOST}" 'mkdir -p /home/ubuntu/terumbu && chmod 700 /home/ubuntu/terumbu'
          scp -i ~/.ssh/terumbu_deploy_key terumbu.production.env "${VPS_USER}@${VPS_HOST}:/home/ubuntu/terumbu/.env"
          ssh -i ~/.ssh/terumbu_deploy_key "${VPS_USER}@${VPS_HOST}" 'chmod 600 /home/ubuntu/terumbu/.env'

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_REPO: https://github.com/${{ github.repository }}.git
          DEPLOY_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/terumbu_deploy_key "${VPS_USER}@${VPS_HOST}" \
            "DEPLOY_BASE=/home/ubuntu/terumbu DEPLOY_REPO='${DEPLOY_REPO}' DEPLOY_REF='${DEPLOY_REF}' bash -s" \
            < scripts/deploy-vps.sh
